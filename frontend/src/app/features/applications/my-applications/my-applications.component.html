<div class="min-h-screen bg-gray-50 py-10 px-6">

  <div class="max-w-6xl mx-auto">

    <!-- HEADER -->

    <div class="mb-10">

      <h1 class="text-4xl font-bold text-gray-900 mb-2">

        My Applications

      </h1>

      <p class="text-gray-500">

        Track jobs you have applied for

      </p>

    </div>

    <!-- APPLICATIONS -->

    <div class="space-y-5">

      <div
        *ngFor="let application of applications"
        class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm"
      >

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

          <!-- LEFT -->

          <div>

            <p class="text-sm text-emerald-600 font-medium mb-2">

              {{application.job?.company}}

            </p>

            <h2 class="text-2xl font-semibold text-gray-900 mb-3">

              {{application.job?.title}}

            </h2>

            <p class="text-gray-600 leading-7 max-w-2xl">

              {{application.job?.desc}}

            </p>

          </div>

          <!-- RIGHT -->

          <div>

            <div
              class="px-5 py-3 rounded-xl text-sm font-medium"

              [ngClass]="{

                'bg-yellow-100 text-yellow-700':
                application.status === 'pending',

                'bg-emerald-100 text-emerald-700':
                application.status === 'accepted',

                'bg-red-100 text-red-700':
                application.status === 'rejected'

              }"
            >

              {{application.status}}

            </div>

          </div>

        </div>

        <!-- FOOTER -->

        <div class="mt-6 pt-4 border-t border-gray-200 flex items-center justify-between">

          <span class="text-sm text-gray-500">

            📍 {{application.job?.location}}

          </span>

          <span class="text-sm text-gray-400">

            Applied Successfully

          </span>

        </div>

      </div>

    </div>

  </div>

</div>
