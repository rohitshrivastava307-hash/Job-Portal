<div class="min-h-screen bg-gray-50 py-10 px-6">

  <div class="max-w-4xl mx-auto">

    <!-- CARD -->

    <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-10">

      <!-- COMPANY -->

      <p class="text-emerald-600 font-medium text-sm mb-4">

        {{job.company}}

      </p>

      <!-- TITLE -->

      <h1 class="text-5xl font-bold text-gray-900 leading-tight mb-6">

        {{job.title}}

      </h1>

      <!-- META -->

      <div class="flex flex-wrap gap-4 mb-8">

        <div class="bg-gray-100 px-4 py-2 rounded-lg text-gray-700 text-sm">

          📍 {{job.location}}

        </div>

        <div class="bg-gray-100 px-4 py-2 rounded-lg text-gray-700 text-sm">

          Posted Job

        </div>

      </div>

      <!-- DESCRIPTION -->

      <div class="mb-10">

        <h2 class="text-2xl font-semibold text-gray-900 mb-4">

          Job Description

        </h2>

        <p class="text-gray-600 leading-8 text-lg">

          {{job.desc}}

        </p>

      </div>

      <!-- ACTION -->

      <button
        (click)="applyJob()"
        class="bg-emerald-600 text-white px-8 py-4 rounded-xl hover:bg-emerald-700 transition"
      >

        Apply Now

      </button>

    </div>

  </div>

</div>
