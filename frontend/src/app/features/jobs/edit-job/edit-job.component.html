<div class="min-h-screen bg-gray-50 py-10 px-6">

  <div class="max-w-3xl mx-auto">

    <!-- HEADER -->

    <div class="mb-10">

      <h1 class="text-4xl font-bold text-gray-900 mb-2">

        Edit Job

      </h1>

      <p class="text-gray-500">

        Update job details and manage your posting

      </p>

    </div>

    <!-- FORM CARD -->

    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">

      <form
        [formGroup]="jobForm"
        (ngSubmit)="onSubmit()"
        class="space-y-6"
      >

        <!-- TITLE -->

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">

            Job Title

          </label>

          <input
            type="text"
            formControlName="title"
            placeholder="Enter job title"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
          >

        </div>

        <!-- COMPANY -->

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">

            Company

          </label>

          <input
            type="text"
            formControlName="company"
            placeholder="Enter company name"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
          >

        </div>

        <!-- DESCRIPTION -->

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">

            Description

          </label>

          <textarea
            formControlName="desc"
            rows="6"
            placeholder="Enter job description"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
          ></textarea>

        </div>

        <!-- LOCATION -->

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">

            Location

          </label>

          <input
            type="text"
            formControlName="location"
            placeholder="Enter location"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
          >

        </div>

        <!-- BUTTON -->

        <button
          type="submit"
          class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition"
        >

          Update Job

        </button>

      </form>

    </div>

  </div>

</div>
