<div class="min-h-screen bg-gray-50 py-10 px-6">

  <div class="max-w-6xl mx-auto">

    <!-- HEADER -->

    <div class="flex items-center justify-between mb-10">

      <div>

        <h1 class="text-4xl font-bold text-gray-900 mb-2">

          My Jobs

        </h1>

        <p class="text-gray-500">

          Manage jobs you created

        </p>

      </div>

      <button
        routerLink="/create-job"
        class="bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700 transition"
      >

        + Create Job

      </button>

    </div>

    <!-- JOBS -->

    <div class="space-y-6">

      <div
        *ngFor="let job of jobs"
        class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm"
      >

        <!-- TOP -->

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5">

          <!-- LEFT -->

          <div>

            <p class="text-sm text-emerald-600 font-medium mb-2">

              {{job.company}}

            </p>

            <h2 class="text-2xl font-semibold text-gray-900 mb-2">

              {{job.title}}

            </h2>

            <p class="text-gray-600 leading-7 max-w-2xl">

              {{job.desc}}

            </p>

          </div>

          <!-- RIGHT -->

          <div class="flex flex-wrap gap-3">

            <button
              [routerLink]="['/edit-job',job._id]"
              class="border border-gray-300 px-5 py-2 rounded-lg hover:bg-gray-100 transition"
            >

              Edit

            </button>

            <button
              (click)="deleteJob(job._id)"
              class="bg-red-500 text-white px-5 py-2 rounded-lg hover:bg-red-600 transition"
            >

              Delete

            </button>

            <button
              [routerLink]="['/applications',job._id]"
              class="bg-emerald-600 text-white px-5 py-2 rounded-lg hover:bg-emerald-700 transition"
            >

              Applicants

            </button>

          </div>

        </div>

        <!-- FOOTER -->

        <div class="mt-6 pt-4 border-t border-gray-200 flex items-center justify-between">

          <span class="text-sm text-gray-500">

            📍 {{job.location}}

          </span>

          <span class="text-sm text-gray-400">

            Posted by you

          </span>

        </div>

      </div>

    </div>

  </div>

</div>
