<div class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10">

  <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-sm p-9">

    <!-- HEADER -->

    <div class="text-center mb-6">

      <h1 class="text-3xl font-bold text-gray-900 mb-2">

        Welcome Back

      </h1>

      <p class="text-gray-500 text-sm">

        Login to continue to JobPortal

      </p>

    </div>

    <!-- FORM -->

    <form
      [formGroup]="reactiveform"
      (ngSubmit)="onSubmit()"
      class="space-y-5"
    >

      <!-- EMAIL -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Email

        </label>

        <input
          type="email"
          placeholder="Enter your email"
          formControlName="email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

        <p
          *ngIf="
            reactiveform.get('email')?.touched &&
            reactiveform.get('email')?.invalid
          "
          class="text-red-500 text-sm mt-2"
        >

          Email is required

        </p>

      </div>

      <!-- PASSWORD -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Password

        </label>

        <input
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

        <p
          *ngIf="
            reactiveform.get('password')?.touched &&
            reactiveform.get('password')?.invalid
          "
          class="text-red-500 text-sm mt-2"
        >

          Password is required

        </p>

      </div>

      <!-- BUTTON -->

      <button
        type="submit"
        [disabled]="reactiveform.invalid"
        class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed"
      >

        Login

      </button>

    </form>

    <!-- FOOTER -->

    <p class="text-center text-gray-500 mt-6 text-sm">

      Don’t have an account?

      <span
        routerLink="/register"
        class="text-emerald-600 cursor-pointer hover:underline"
      >

        Register

      </span>

    </p>

  </div>

</div>
