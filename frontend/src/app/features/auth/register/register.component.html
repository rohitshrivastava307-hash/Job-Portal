<div class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10">

  <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-sm p-9">

    <!-- HEADER -->

    <div class="text-center mb-6">

      <h1 class="text-3xl font-bold text-gray-900 mb-2">

        Create Account

      </h1>

      <p class="text-gray-500 text-sm">

        Start your journey with JobPortal

      </p>

    </div>

    <!-- FORM -->

    <form
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
      class="space-y-4"
    >

      <!-- NAME -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Name

        </label>

        <input
          type="text"
          placeholder="Enter your name"
          formControlName="name"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

      </div>

      <!-- EMAIL -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Email

        </label>

        <input
          type="email"
          placeholder="Enter your email"
          formControlName="email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

      </div>

      <!-- PASSWORD -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Password

        </label>

        <input
          type="password"
          placeholder="Enter password"
          formControlName="password"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

      </div>

      <!-- CONFIRM PASSWORD -->

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">

          Confirm Password

        </label>

        <input
          type="password"
          placeholder="Confirm password"
          formControlName="confirmPassword"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
        >

      </div>

      <!-- ROLE -->

      <div>

        <p class="text-sm font-medium text-gray-700 mb-3">

          Select Role

        </p>

        <div class="flex gap-6">

          <label class="flex items-center gap-2 text-gray-700 text-sm">

            <input
              type="radio"
              value="job_seeker"
              formControlName="role"
              class="accent-emerald-600"
            >

            Job Seeker

          </label>

          <label class="flex items-center gap-2 text-gray-700 text-sm">

            <input
              type="radio"
              value="recruiter"
              formControlName="role"
              class="accent-emerald-600"
            >

            Recruiter

          </label>

        </div>

      </div>

      <!-- BUTTON -->

      <button
        type="submit"
        class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition"
      >

        Register

      </button>

    </form>

    <!-- FOOTER -->

    <p class="text-center text-gray-500 mt-6 text-sm">

      Already have an account?

      <span
        routerLink="/login"
        class="text-emerald-600 cursor-pointer hover:underline"
      >

        Login

      </span>

    </p>

  </div>

</div>
